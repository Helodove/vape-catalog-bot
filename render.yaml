services:
  - type: web
    name: vape-catalog-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MOYSKLAD_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
